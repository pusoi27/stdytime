{% extends "base.html" %}

{% block title %}{% if action == 'Edit' %}Edit{% else %}Create{% endif %} Instructor Profile{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card shadow-sm">
                <div class="card-header" style="background-color:#0d6efd; color:white;">
                    <h4 class="mb-0">
                        <i class="bi bi-person-workspace"></i>
                        {% if action == 'Edit' %}Edit{% else %}Create{% endif %} Instructor Profile
                    </h4>
                </div>

                <div class="card-body">
                    <form method="POST" action="{{ url_for('instructor_profile_edit') }}">
                        <div class="mb-3">
                            <label for="name" class="form-label">Instructor Name <span class="text-danger">*</span></label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="name" 
                                name="name" 
                                value="{{ profile.name if profile else '' }}"
                                placeholder="Enter instructor name"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input 
                                type="email" 
                                class="form-control" 
                                id="email" 
                                name="email" 
                                value="{{ profile.email if profile else '' }}"
                                placeholder="Enter email address"
                            >
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input 
                                type="tel" 
                                class="form-control" 
                                id="phone" 
                                name="phone" 
                                value="{{ profile.phone if profile else '' }}"
                                placeholder="Enter phone number"
                            >
                        </div>

                        <div class="mb-3">
                            <label for="center_location" class="form-label">Center Location Name</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="center_location" 
                                name="center_location" 
                                value="{{ profile.center_location if profile else '' }}"
                                placeholder="Enter center location name"
                            >
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('instructor_profile') }}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Save Profile
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
