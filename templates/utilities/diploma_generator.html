{% extends "base.html" %}

{% block title %}Diploma Generator - KumoClock{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <h1 class="mb-4">
                <i class="bi bi-award"></i> Diploma Generator
            </h1>

            <!-- Status Messages -->
            <div id="statusMessages"></div>

            <!-- Main Form -->
            <div class="card mb-4">
                <div class="card-body">
                    <form id="diplomaForm">
                        <!-- Diploma Type Selection -->
                        <div class="mb-4">
                            <label for="diplomaType" class="form-label">Diploma Type</label>
                            <div id="templateStatus" class="small text-muted mb-2"></div>
                            <select id="diplomaType" class="form-select" required>
                                <option value="">-- Select Diploma Type --</option>
                                <option value="Award">Certificate of Award</option>
                                <option value="Certificate">Certificate of Recognition</option>
                                <option value="Welcome">Certificate of Welcome</option>
                            </select>
                        </div>

                        <!-- Student Selection -->
                        <div class="mb-4">
                            <label for="studentSelect" class="form-label">Select Students</label>
                            <div class="input-group mb-2">
                                <input 
                                    type="text" 
                                    id="studentSearch" 
                                    class="form-control" 
                                    placeholder="Search students..."
                                >
                                <button class="btn btn-outline-secondary" type="button" id="selectAllBtn">
                                    Select All
                                </button>
                                <button class="btn btn-outline-secondary" type="button" id="clearAllBtn">
                                    Clear All
                                </button>
                            </div>
                            <div id="studentList" class="list-group" style="max-height: 300px; overflow-y: auto;"></div>
                            <small class="text-muted mt-2">Selected: <span id="selectedCount">0</span></small>
                        </div>

                        <!-- Options -->
                        <div class="mb-4">
                            <div class="form-check">
                                <input 
                                    type="checkbox" 
                                    class="form-check-input" 
                                    id="includePdf"
                                >
                                <label class="form-check-label" for="includePdf">
                                    Also convert to PDF (requires docx2pdf)
                                </label>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-grid gap-2 d-sm-flex">
                            <button type="submit" class="btn btn-primary btn-lg" id="generateBtn">
                                <i class="bi bi-file-pdf"></i> Generate Diplomas
                            </button>
                            <button type="reset" class="btn btn-secondary">
                                Reset
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Results Section -->
            <div id="resultsSection" class="card" style="display: none;">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-check-circle"></i> Generation Results
                    </h5>
                </div>
                <div class="card-body">
                    <!-- Progress -->
                    <div id="progressDiv" class="mb-3" style="display: none;">
                        <div class="progress">
                            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"></div>
                        </div>
                        <p class="text-muted small mt-2"><span id="progressText">Generating...</span></p>
                    </div>

                    <!-- Results Summary -->
                    <div id="resultsSummary" class="mb-3">
                        <p><strong>DOCX Generated:</strong> <span id="generatedCount">0</span> diplomas</p>
                        <p id="pdfLine" style="display: none;">
                            <strong>PDF Generated:</strong> <span id="pdfCount">0</span> files
                        </p>
                    </div>

                    <!-- Output Directories -->
                    <div class="alert alert-info mb-3">
                        <strong>Files saved to:</strong>
                        <div id="outputPaths"></div>
                    </div>

                    <!-- Diplomas List -->
                    <div id="diplomasList" class="mb-3">
                        <h6>Generated Diplomas:</h6>
                        <div id="diplomasTable"></div>
                    </div>

                    <!-- Errors (if any) -->
                    <div id="errorsSection" style="display: none;">
                        <h6 class="text-danger">Errors/Warnings:</h6>
                        <div id="errorsList" class="alert alert-warning"></div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="d-grid gap-2 d-sm-flex">
                        <button class="btn btn-secondary" onclick="location.reload()">
                            <i class="bi bi-arrow-counterclockwise"></i> Generate Another
                        </button>
                        <button class="btn btn-outline-primary" id="downloadCsvBtn" style="display: none;">
                            <i class="bi bi-download"></i> Download CSV
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Template for student list items -->
<template id="studentItemTemplate">
    <label class="list-group-item">
        <input class="form-check-input me-2 student-checkbox" type="checkbox" value="">
        <span class="student-name"></span>
        <small class="text-muted ms-2 student-level"></small>
    </label>
</template>

<style>
#studentList {
    border: 1px solid #dee2e6;
    border-radius: 0.25rem;
}

.list-group-item {
    cursor: pointer;
    padding: 0.5rem 0.75rem;
    margin-bottom: 0;
}

.list-group-item:hover {
    background-color: #f8f9fa;
}

.list-group-item input[type="checkbox"] {
    cursor: pointer;
}

.list-group-item input[type="checkbox"]:checked {
    background-color: #0d6efd;
    border-color: #0d6efd;
}

.student-checkbox {
    margin-top: 0.3rem;
}
</style>

<script>
const students = {{ students | tojson }};
const templateFiles = {
    'Award': 'Certificate of Award.docx',
    'Certificate': 'Certificate of Recognition.docx',
    'Welcome': 'Certificate of Welcome.docx'
};

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    renderStudentList();
    checkTemplateAvailability();
    setupEventListeners();
});

function renderStudentList() {
    const listDiv = document.getElementById('studentList');
    const template = document.getElementById('studentItemTemplate');
    
    listDiv.innerHTML = '';
    
    students.sort((a, b) => a.name.localeCompare(b.name)).forEach(student => {
        const clone = template.content.cloneNode(true);
        clone.querySelector('input').value = student.name;
        clone.querySelector('.student-name').textContent = student.name;
        clone.querySelector('.student-level').textContent = `${student.subject || 'N/A'} - ${student.level || 'N/A'}`;
        listDiv.appendChild(clone);
    });
}

function setupEventListeners() {
    // Search filter
    document.getElementById('studentSearch').addEventListener('input', (e) => {
        const filter = e.target.value.toLowerCase();
        document.querySelectorAll('#studentList .list-group-item').forEach(item => {
            const name = item.querySelector('.student-name').textContent.toLowerCase();
            item.style.display = name.includes(filter) ? '' : 'none';
        });
    });

    // Select All
    document.getElementById('selectAllBtn').addEventListener('click', () => {
        document.querySelectorAll('#studentList input[type="checkbox"]:not(:disabled)').forEach(cb => {
            cb.checked = true;
        });
        updateSelectedCount();
    });

    // Clear All
    document.getElementById('clearAllBtn').addEventListener('click', () => {
        document.querySelectorAll('#studentList input[type="checkbox"]').forEach(cb => {
            cb.checked = false;
        });
        updateSelectedCount();
    });

    // Update count when checkboxes change
    document.getElementById('studentList').addEventListener('change', updateSelectedCount);

    // Form submission
    document.getElementById('diplomaForm').addEventListener('submit', generateDiplomas);
}

function updateSelectedCount() {
    const count = document.querySelectorAll('#studentList input[type="checkbox"]:checked').length;
    document.getElementById('selectedCount').textContent = count;
}

function checkTemplateAvailability() {
    fetch('/api/utilities/diploma-generator/templates')
        .then(r => r.json())
        .then(data => {
            if (data.templates) {
                const status = data.templates
                    .map(t => `${t.type}: ${t.exists ? '✓' : '✗'}`)
                    .join(' | ');
                document.getElementById('templateStatus').textContent = `Available: ${status}`;
                
                // Warn if no templates exist
                const hasTemplates = data.templates.some(t => t.exists);
                if (!hasTemplates) {
                    showMessage('warning', 'No certificate templates found in /data directory. Please upload DOCX templates.');
                }
            }
        })
        .catch(err => console.error('Error checking templates:', err));
}

async function generateDiplomas(e) {
    e.preventDefault();

    const selectedCheckboxes = document.querySelectorAll('#studentList input[type="checkbox"]:checked');
    const studentNames = Array.from(selectedCheckboxes).map(cb => cb.value);
    
    if (studentNames.length === 0) {
        showMessage('warning', 'Please select at least one student.');
        return;
    }

    const diplomaType = document.getElementById('diplomaType').value;
    if (!diplomaType) {
        showMessage('warning', 'Please select a diploma type.');
        return;
    }

    const includePdf = document.getElementById('includePdf').checked;

    // Show progress
    document.getElementById('progressDiv').style.display = 'block';
    document.getElementById('progressBar').style.width = '50%';
    document.getElementById('progressText').textContent = `Generating ${studentNames.length} diplomas...`;
    document.getElementById('generateBtn').disabled = true;

    try {
        const response = await fetch('/api/utilities/diploma-generator/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                students: studentNames,
                diploma_type: diplomaType,
                include_pdf: includePdf
            })
        });

        const result = await response.json();

        if (response.ok && result.success) {
            displayResults(result);
        } else {
            showMessage('error', result.error || 'Failed to generate diplomas');
            console.error('Server error:', result);
        }
    } catch (error) {
        showMessage('error', `Error: ${error.message}`);
        console.error('Fetch error:', error);
    } finally {
        document.getElementById('generateBtn').disabled = false;
        document.getElementById('progressDiv').style.display = 'none';
    }
}

function displayResults(result) {
    document.getElementById('resultsSection').style.display = 'block';
    
    // Update counts
    document.getElementById('generatedCount').textContent = result.generated || 0;
    
    if (result.pdf_generated !== undefined) {
        document.getElementById('pdfLine').style.display = 'block';
        document.getElementById('pdfCount').textContent = result.pdf_generated || 0;
    }

    // Output paths
    const pathsHtml = `
        <div><strong>DOCX:</strong> <code>${result.output_dir}</code></div>
        ${result.pdf_dir ? `<div><strong>PDF:</strong> <code>${result.pdf_dir}</code></div>` : ''}
    `;
    document.getElementById('outputPaths').innerHTML = pathsHtml;

    // Diplomas table
    if (result.diplomas && result.diplomas.length > 0) {
        const tableHtml = result.diplomas.map(d => `
            <div class="d-flex justify-content-between align-items-center p-2 border-bottom">
                <div>
                    <strong>${d['Full Name']}</strong><br>
                    <small class="text-muted">${d.Diploma}</small>
                </div>
                <small class="text-success">✓ Generated</small>
            </div>
        `).join('');
        document.getElementById('diplomasTable').innerHTML = tableHtml;
    }

    // Errors (if any)
    const allErrors = [
        ...(result.pdf_failed || []),
        ...(result.failed || [])
    ];
    
    if (allErrors.length > 0) {
        document.getElementById('errorsSection').style.display = 'block';
        const errorsHtml = allErrors
            .map(e => `<div class="small"><i class="bi bi-exclamation-circle"></i> ${e}</div>`)
            .join('');
        document.getElementById('errorsList').innerHTML = errorsHtml;
    }

    // Scroll to results
    document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
}

function showMessage(type, message) {
    const messagesDiv = document.getElementById('statusMessages');
    const alertClass = {
        'error': 'alert-danger',
        'warning': 'alert-warning',
        'success': 'alert-success',
        'info': 'alert-info'
    }[type] || 'alert-info';

    messagesDiv.innerHTML = `
        <div class="alert ${alertClass} alert-dismissible fade show" role="alert">
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    `;

    setTimeout(() => {
        const alert = messagesDiv.querySelector('.alert');
        if (alert) {
            alert.remove();
        }
    }, 5000);
}
</script>
{% endblock %}
