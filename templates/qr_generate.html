{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <div class="row">
    <div class="col-md-8 mx-auto">
      <h2><i class="bi bi-qr-code"></i> Generate QR Code</h2>
      <p class="text-muted">Select a student to generate their QR code.</p>

      <div class="card">
        <div class="card-body">
          <form id="qrForm" method="post">
            <div class="mb-3">
              <label for="studentSelect" class="form-label">Select Student:</label>
              <select id="studentSelect" class="form-control" required>
                <option value="">-- Choose a student --</option>
                {% for student in students %}
                  {% if student[0] and student[1] %}
                    <option value="{{ student[0] }}">{{ student[1] }} (ID: {{ student[0] }})</option>
                  {% endif %}
                {% endfor %}
              </select>
            </div>

            <div class="mb-3">
              <button type="button" class="btn btn-primary" onclick="generateQR()">
                <i class="bi bi-qr-code"></i> Generate QR Code
              </button>
              <button type="button" class="btn btn-warning ms-2" onclick="generateAllQRs()">
                <i class="bi bi-grid-3x3-gap"></i> Generate QR for All Students
              </button>
            </div>
          </form>

          <div id="qrResult" style="display:none; text-align:center; margin-top:20px;">
            <h5>QR Code Generated:</h5>
            <img id="qrImage" src="" alt="QR Code" style="max-width:300px; border:1px solid #ccc; padding:10px;">
            <div class="mt-3">
              <button class="btn btn-success" onclick="printQR()"><i class="bi bi-printer"></i> Print</button>
              <button class="btn btn-info" onclick="downloadQR()"><i class="bi bi-download"></i> Download</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function generateQR(){
  const sid = document.getElementById('studentSelect').value;
  if(!sid){
    alert('Please select a student');
    return;
  }
  const img = document.getElementById('qrImage');
  img.src = `/qr/generate/${sid}?v=${Date.now()}`;
  document.getElementById('qrResult').style.display = 'block';
}

function printQR(){
  const img = document.getElementById('qrImage');
  const printWindow = window.open();
  printWindow.document.write(`<html><head><title>QR Code Print</title></head><body><img src="${img.src}" style="max-width:400px;"></body></html>`);
  printWindow.document.close();
  printWindow.print();
}

function downloadQR(){
  const sid = document.getElementById('studentSelect').value;
  const a = document.createElement('a');
  a.href = `/qr/generate/${sid}?v=${Date.now()}`;
  a.download = `student_${sid}_qr.png`;
  a.click();
}

async function generateAllQRs(){
  if(!confirm('Generate QR codes for all students (will skip existing)?')) return;
  try{
    const res = await fetch('/qr/generate_all', { method: 'POST' });
    const j = await res.json();
    if(!res.ok){
      alert('Failed: '+(j.error||res.statusText));
      return;
    }
    alert(`Generated: ${j.generated_count}\nSkipped: ${j.skipped_count}`);
    // Optionally show lists in console
    console.log('Generated files:', j.generated);
    console.log('Skipped files:', j.skipped);
  }catch(err){
    alert('Error: '+err.message);
  }
}
</script>
{% endblock %}
