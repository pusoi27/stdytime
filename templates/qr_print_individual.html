{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <div class="row">
    <div class="col-md-8 mx-auto">
      <h2><i class="bi bi-printer"></i> Print QR Code - Individual Student</h2>
      <p class="text-muted">Select a student to print their QR code on Avery 8160 labels.</p>

      <div class="card">
        <div class="card-body">
          <form id="printForm">
            <div class="mb-3">
              <label for="studentSelect" class="form-label">Select Student:</label>
              <select id="studentSelect" class="form-control" required onchange="loadQRPreview()">
                <option value="">-- Choose a student --</option>
                {% for student in students %}
                  {% if student[0] and student[1] %}
                    <option value="{{ student[0] }}">{{ student[1] }} (ID: {{ student[0] }})</option>
                  {% endif %}
                {% endfor %}
              </select>
            </div>

            <div id="preview" style="text-align:center; margin:20px 0; display:none;">
              <h5>Preview:</h5>
              <img id="previewImage" src="" alt="QR Code Preview" style="max-width:200px; border:1px solid #ddd; padding:10px;" onerror="this.style.display='none';">
            </div>

            <div>
              <button type="button" class="btn btn-success" onclick="downloadStudentPDF()">
                <i class="bi bi-download"></i> Download PDF (Avery 8160)
              </button>
              <a href="{{ url_for('qr_generate') }}" class="btn btn-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function loadQRPreview(){
  const sid = document.getElementById('studentSelect').value;
  if(!sid){
    document.getElementById('preview').style.display = 'none';
    return;
  }
  const img = document.getElementById('previewImage');
  img.src = `/qr/generate/${sid}?v=${Date.now()}`;
  document.getElementById('preview').style.display = 'block';
}

function downloadStudentPDF(){
  const sid = document.getElementById('studentSelect').value;
  if(!sid){
    alert('Please select a student');
    return;
  }
  if(!confirm('Download PDF for selected student?')) return;
  window.location.href = `/qr/pdf/individual/${sid}`;
}
</script>
{% endblock %}
