<!-- COLUMN 1 – Student List -->
<div id="studentsCol" class="col-lg-2 col-md-3 col-3 dashboard-col">
  <div class="card shadow-sm h-100">
    <div class="card-body d-flex flex-column" style="padding:0.5rem;">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <h6 class="text-primary fw-bold m-0">
          <i class="bi bi-list-task"></i>
        </h6>
        <button id="refreshList" type="button" class="btn btn-sm btn-outline-primary">
          <i class="bi bi-arrow-clockwise"></i>
        </button>
      </div>
      <input id="searchInput"
             class="form-control form-control-sm"
             placeholder="Search student...">
      <p class="small text-muted" id="registeredCount"></p>
      <div id="studentList"
           class="overflow-auto flex-grow-1"
           style="max-height:80vh;"></div>
    </div>
  </div>
</div>
