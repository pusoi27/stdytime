<!-- COLUMN 2 – Active Students (16 Seats Grid: 4x4) -->
<div id="activeCol" class="col dashboard-col">
  <div class="card shadow-sm h-100">
    <div class="card-body d-flex flex-column overflow-hidden" style="padding:0.5rem;">

      <!-- Active Students Section -->
      <h6 class="text-success fw-bold mb-1" style="margin:0 0 0.5rem 0;">
        <i class="bi bi-lightning-charge"></i> Active Students in Class <span id="activeCount" class="small"></span>
      </h6>
       <div id="seatGrid"
         style="display:grid; grid-template-columns:repeat(4,1fr); gap:0.5rem; overflow-y:auto; overflow-x:hidden; width:100%; padding:0; margin:0; flex:1 1 auto; min-height:0;"></div>
       <!-- Overflow list for students beyond seat limit -->
       <div id="overflowStudents" class="mt-1" style="display:none;">
         <h6 class="text-warning fw-bold small"><i class="bi bi-list-ul"></i> Additional Students Waiting:</h6>
         <div id="overflowList" class="d-flex flex-wrap gap-2"></div>
       </div>
    </div>
  </div>
</div>
