<!-- COLUMN 2 – Active Students (16 Seats Grid: 4x4) -->
<div id="activeCol" class="col-lg-8 col-md-6 col-6 dashboard-col">
  <div class="card shadow-sm h-100">
    <div class="card-body d-flex flex-column overflow-hidden" style="padding:0.5rem;">      <!-- Assistants on Duty Section -->
      <div id="assistantsOnDutySection" class="mb-2" style="display:none;">
        <h6 class="text-info fw-bold mb-1" style="font-size:0.9em;">
          <i class="bi bi-person-badge"></i> Assistants on Duty
        </h6>
        <div id="assistantsDutyList" class="row g-1 mb-2">
          <!-- Populated by JavaScript -->
        </div>
        <hr class="my-1">
      </div>

      <!-- Active Students Section -->
      <h6 class="text-success fw-bold mb-1" style="margin:0 0 0.5rem 0;">
        <i class="bi bi-lightning-charge"></i> Active Students in Class <span id="activeCount" class="small"></span>
      </h6>
       <div id="seatGrid"
         style="display:grid; grid-template-columns:repeat(4,1fr); gap:0.5rem; max-height:85vh; overflow-y:auto; overflow-x:hidden; width:100%; padding:0; margin:0;"></div>
       <!-- Overflow list for students beyond seat limit -->
       <div id="overflowStudents" class="mt-1" style="display:none;">
         <h6 class="text-warning fw-bold small"><i class="bi bi-list-ul"></i> Additional Students Waiting:</h6>
         <div id="overflowList" class="d-flex flex-wrap gap-2"></div>
       </div>
    </div>
  </div>
</div>
