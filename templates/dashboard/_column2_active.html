<!-- COLUMN 2 – Active Students (20 Seats Grid) -->
<div class="col-lg-8 col-md-6">
  <div class="card shadow-sm h-100">
    <div class="card-body d-flex flex-column">      <!-- Assistants on Duty Section -->
      <div id="assistantsOnDutySection" class="mb-2" style="display:none;">
        <h6 class="text-info fw-bold mb-1" style="font-size:0.9em;">
          <i class="bi bi-person-badge"></i> Assistants on Duty
        </h6>
        <div id="assistantsDutyList" class="row g-1 mb-2">
          <!-- Populated by JavaScript -->
        </div>
        <hr class="my-1">
      </div>

      <!-- Active Students Section -->      <h6 class="text-success fw-bold mb-1">
        <i class="bi bi-lightning-charge"></i> Active Students in Class <span id="activeCount" class="small"></span>
      </h6>
       <div id="seatGrid"
         class="row row-cols-2 row-cols-sm-3 row-cols-md-5 row-cols-lg-5 g-2 overflow-auto flex-grow-1"
         style="max-height:80vh;"></div>
       <!-- Overflow list for students beyond seat limit -->
       <div id="overflowStudents" class="mt-2" style="display:none;">
         <h6 class="text-warning fw-bold small"><i class="bi bi-list-ul"></i> Additional Students Waiting:</h6>
         <div id="overflowList" class="d-flex flex-wrap gap-2"></div>
       </div>
    </div>
  </div>
</div>
