<script>
const SEAT_LIMIT = 20;
const SEAT_LIMIT_FULLSCREEN = 40; // More seats when maximized
const DURATION_LIMITS = { "S1": 30*60, "S2": 60*60 };
const IDLE_TIMEOUT_MS = 60000; // 1 minute
const isActiveClassWindow = true; // only dashboard should handle class check-in/out

let idleTimer = null;
let isFullscreenMode = false;
let lastActivityTime = Date.now();

function pageIsReadyForScan(){
  return document.visibilityState === 'visible' && document.hasFocus();
}

function recordActivity(){
  lastActivityTime = Date.now();
  if(isFullscreenMode){
    exitFullscreenMode();
  }
  resetIdleTimer();
}

function resetIdleTimer(){
  if(idleTimer) clearTimeout(idleTimer);
  idleTimer = setTimeout(checkIdleState, IDLE_TIMEOUT_MS);
}

function checkIdleState(){
  // Only enter fullscreen if there are active students
  const seatGrid = document.getElementById('seatGrid');
  const activeCards = seatGrid.querySelectorAll('.seat-card');
  if(activeCards.length > 0 && !isFullscreenMode){
    enterFullscreenMode();
  }
}

function enterFullscreenMode(){
  isFullscreenMode = true;
  const col1 = document.querySelector('.col-lg-2');
  const col2 = document.querySelector('.col-lg-8');
  const col3 = document.querySelector('.col-lg-2');
  
  if(col1) col1.style.display = 'none';
  if(col3) col3.style.display = 'none';
  if(col2){
    col2.className = 'col-12';
    col2.querySelector('.card').style.height = '100vh';
  }
  
  // Rebuild grid with more seats
  fetchDashboardData();
}

function exitFullscreenMode(){
  if(!isFullscreenMode) return;
  isFullscreenMode = false;
  
  const col1 = document.querySelector('.col-12');
  const hiddenCols = document.querySelectorAll('[style*="display: none"]');
  
  if(col1){
    col1.className = 'col-lg-8 col-md-6';
    col1.querySelector('.card').style.height = '';
  }
  
  hiddenCols.forEach(col => {
    if(col.classList.contains('col-lg-2')){
      col.style.display = '';
    }
  });
  
  // Rebuild grid with normal seat count
  fetchDashboardData();
}

function formatHHMMSS(sec){
  const h=Math.floor(sec/3600), m=Math.floor(sec%3600/60), s=sec%60;
  return [h,m,s].map(v=>String(v).padStart(2,"0")).join(":");
}
function formatSessionTime(seconds){
  const mins=Math.floor(seconds/60), h=Math.floor(mins/60), m=mins%60;
  return `${h} h ${m} m`;
}

function updateAllPhotos(students){
  console.debug('[dashboard] updateAllPhotos called for', students.length, 'students');
  students.forEach(s=>{
    const imgs = document.querySelectorAll(`img[data-sid="${s.id}"]`);
    console.debug(`[dashboard] updating photos for id=${s.id} name=${s.name} photo=${s.photo} imgs=${imgs.length}`);
    imgs.forEach(img=>{
      if(s.photo){
        const newsrc = `/static/img/students/${s.photo}?v=${Date.now()}`;
        console.debug('[dashboard] set src for', s.id, newsrc);
        img.src = newsrc;
        img.onerror = ()=>{ img.src = '/static/img/default.png'; };
      }else{
        // try a few candidate filenames derived from the student name
        const candidates = [
          `/static/img/students/${encodeURIComponent(s.name)}.png?v=${Date.now()}`,
          `/static/img/students/${encodeURIComponent(s.name)}..png?v=${Date.now()}`
        ];
        let i=0;
        img.onerror = ()=>{ i++; if(i<candidates.length) { console.debug('[dashboard] trying candidate', candidates[i]); img.src=candidates[i]; } else { img.src='/static/img/default.png'; } };
        console.debug('[dashboard] trying candidate', candidates[0]);
        img.src = candidates[0];
      }
    });
  });
}

async function fetchDashboardData(){

  const resAll=await fetch('/api/students/list');
  const students=await resAll.json();
  const resSess=await fetch('/api/sessions/active');
  const sessions=await resSess.json();
  const resAssist=await fetch('/api/assistants/list');
  const assistants=await resAssist.json();
  buildStudentList(students);
  buildSeatGrid(sessions);
  buildCheckedList(students);
  buildAssistantsList(assistants);
  // After rebuilding DOM, ensure images are refreshed (cache-bust)
  updateAllPhotos(students);
}
// ---------- Column 2 (Assistants) ----------
function buildAssistantsList(assistants){
  const section = document.getElementById("assistantsOnDutySection");
  const list = document.getElementById("assistantsDutyList");
  const onDuty = assistants.filter(a => a.on_duty);
  
  if(onDuty.length === 0){
    section.style.display = "none";
    return;
  }
  
  section.style.display = "block";
  list.innerHTML = "";
  onDuty.forEach(a => {
    const div = document.createElement("div");
    div.className = "col-auto";
    const start = a.start_time ? new Date(a.start_time) : new Date();
    const timerId = `timer_assist_${a.id}`;
    div.innerHTML = `
      <div class="card p-1 border-info bg-light" style="min-width:140px;">
        <div class="fw-bold text-dark" style="font-size:0.95em; line-height:1.2;">
          <i class="bi bi-person-badge"></i> ${a.name}
        </div>
        ${a.role ? '<small class="text-muted" style="line-height:1.2;">' + a.role + '</small>' : ''}
        <div class="timer-assist fw-bold text-info" id="${timerId}" style="font-size:0.9em; margin-top:2px; line-height:1.2;">00:00:00</div>
      </div>
    `;
    list.appendChild(div);
    
    // Start timer for this assistant
    setInterval(() => {
      const diff = Math.floor((new Date() - start) / 1000);
      const tEl = document.getElementById(timerId);
      if(tEl) tEl.textContent = formatHHMMSS(diff);
    }, 1000);
  });
}
// ---------- Column 1 ----------
function buildStudentList(data){
  const list=document.getElementById("studentList");
  list.innerHTML="";
  let available=0;
  data.forEach(s=>{
    if(s.status==="registered"){
      available++;
      const div=document.createElement("div");
      div.className="p-2 border rounded mb-1 hover-bg d-flex align-items-center";
      // build image element with onerror-driven fallbacks when photo is not set
      const img=document.createElement('img');
      img.className='rounded-circle me-2'; img.width=32; img.height=32; img.setAttribute('data-sid', s.id);
      if(s.photo){
        img.src = `/static/img/students/${s.photo}?v=${Date.now()}`;
        img.onerror = ()=>{ img.src = '/static/img/default.png'; };
      }else{
        const candidates = [
          `/static/img/students/${encodeURIComponent(s.name)}.png?v=${Date.now()}`,
          `/static/img/students/${encodeURIComponent(s.name)}..png?v=${Date.now()}`
        ];
        let i=0;
        img.onerror = ()=>{ i++; if(i<candidates.length) img.src=candidates[i]; else img.src='/static/img/default.png'; };
        img.src = candidates[0];
      }
      const info=document.createElement('div'); info.className='flex-fill';
      info.innerHTML = `<b>${s.name}</b><br><small class="text-muted">${s.subject} · ${s.level}</small>`;
      div.appendChild(img);
      div.appendChild(info);
      div.onclick=async()=>{
        if(confirm("Start session for "+s.name+"?")){
          await fetch(`/api/students/start/${s.id}`,{method:'POST'});
          fetchDashboardData();
        }
      };
      list.appendChild(div);
    }
  });
  document.getElementById("registeredCount").innerText=
    `${available} students available`;
}

// ---------- Column 2 ----------
function buildSeatGrid(activeSessions){
  const grid=document.getElementById("seatGrid");
  grid.innerHTML="";
  document.getElementById("activeCount").innerText=
    `(${activeSessions.length} active)`;
  const seatLimit = isFullscreenMode ? SEAT_LIMIT_FULLSCREEN : SEAT_LIMIT;
  for(let i=0;i<seatLimit;i++){
    const seatLabel="Seat "+(i+1);
    const col=document.createElement("div"); col.className="col";
    const s=activeSessions[i];
    if(s){
      const start=new Date((s.start_time||"").replace(/\u202f|\u2009/g," "));
      const limit=DURATION_LIMITS[s.subject]||1800;
      const photo = s.photo ? `/static/img/students/${s.photo}?v=${Date.now()}` : '/static/img/default.png';
        const card=document.createElement("div");
        card.className="card text-center shadow-sm seat-card";
        card.innerHTML=`
          <img src="${photo}" data-sid="${s.id}" class="rounded-circle mb-1" width="56" height="56" alt="photo">
          <h6 class="fw-semibold mb-0 small">${s.name}</h6>
          <small class="text-muted small">${s.subject} – ${seatLabel}</small>
          <div class="timer fw-bold" style="font-size:1.1em; margin-top:0.5rem;">--:--:--</div>
          <small class="text-muted started small">
            Started: ${start.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</small>`;
      card.onclick=async()=>{
        if(confirm("Stop session for "+s.name+"?")){
          await fetch(`/api/students/stop/${s.id}`,{method:'POST'});
          fetchDashboardData();
        }
      };
      col.appendChild(card); grid.appendChild(col);
      const tEl=card.querySelector(".timer");
      setInterval(()=>{
        const diff=Math.floor((new Date()-start)/1000);
        tEl.textContent=formatHHMMSS(diff);
        tEl.classList.toggle("text-danger",diff>limit);
        tEl.classList.toggle("text-success",diff<=limit);
      },1000);
    }else{
      col.innerHTML=`<div class="card p-3 text-center shadow-sm seat-empty">
          <div class="fw-light text-muted" style="height:100px;
             display:flex;align-items:center;justify-content:center;">
            ${seatLabel} Empty
          </div></div>`;
      grid.appendChild(col);
    }
  }
}

// ---------- Column 3 ----------
function buildCheckedList(data){
  const checked=data.filter(s=>s.status==="checked");
  const ul=document.getElementById("checkedList"); ul.innerHTML="";
    checked.forEach(s=>{
        const photo = s.photo ? `/static/img/students/${s.photo}?v=${Date.now()}` : '/static/img/default.png';
      // prefer accumulated total_seconds (today) if available, otherwise fall back to last-session duration
      const dur = formatSessionTime(s.total_seconds || s.duration || 0);
    const li=document.createElement("li");
    li.className="list-group-item";
    li.innerHTML=`<div class="d-flex align-items-center">
      <img src="${photo}" data-sid="${s.id}" class="rounded-circle me-2" width="32" height="32" alt="photo">
      <div><div class="fw-semibold">${s.name}</div>
      <div class="text-success small">${dur}</div></div></div>`;
    ul.appendChild(li);
  });
  document.getElementById("checkedCount").innerText=
    `${checked.length} students checked out today`;
}

// ---------- Search + Refresh ----------
// wire refresh to rebuild and then explicitly update image sources
const refreshBtn = document.getElementById("refreshList");
if(refreshBtn){
  refreshBtn.addEventListener('click', async (e)=>{
    e.preventDefault();
    console.debug('[dashboard] refresh button clicked');
    // ask user for path to photos (remember last value in localStorage)
    const last = localStorage.getItem('photosPath') || '';
    const path = prompt('Enter path to photos folder (absolute or relative to project):', last);
    if(path === null) return; // user cancelled
    localStorage.setItem('photosPath', path);
    try{
      const res = await fetch('/api/photos/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path })
      });
      const j = await res.json().catch(()=>({}));
      if(!res.ok){
        console.warn('[dashboard] scan failed', j);
        alert('Photo scan failed: '+(j.error || res.statusText || 'unknown'));
      } else {
        console.debug('[dashboard] scan result', j);
      }
    }catch(err){
      console.error('[dashboard] scan error', err);
      alert('Error scanning photos: '+err.message);
    }
    // always refresh the dashboard data after scan attempt
    fetchDashboardData();
  });
} else {
  console.warn('[dashboard] refreshList button not found');
}
document.getElementById("searchInput").addEventListener("input",e=>{
  const term=e.target.value.toLowerCase();
  document.querySelectorAll("#studentList > div").forEach(div=>{
    div.style.display=div.innerText.toLowerCase().includes(term)?"":"none";
  });
});

fetchDashboardData();

// ---------------- Idle Fullscreen Mode ----------------
function recordActivity(){
  if(isFullscreenMode){
    exitFullscreenMode();
  }
  resetIdleTimer();
}

function resetIdleTimer(){
  if(idleTimer) clearTimeout(idleTimer);
  idleTimer = setTimeout(checkIdleState, IDLE_TIMEOUT_MS);
}

function checkIdleState(){
  const seatGrid = document.getElementById('seatGrid');
  const activeCards = seatGrid.querySelectorAll('.seat-card');
  if(activeCards.length > 0 && !isFullscreenMode){
    enterFullscreenMode();
  }
}

function enterFullscreenMode(){
  isFullscreenMode = true;
  const col1 = document.querySelectorAll('.col-lg-2')[0];
  const col2 = document.querySelector('.col-lg-8');
  const col3 = document.querySelectorAll('.col-lg-2')[1];
  
  if(col1) col1.style.display = 'none';
  if(col3) col3.style.display = 'none';
  if(col2){
    col2.classList.remove('col-lg-8', 'col-md-6');
    col2.classList.add('col-12');
    const card = col2.querySelector('.card');
    if(card) card.style.height = '98vh';
  }
  
  fetchDashboardData();
}

function exitFullscreenMode(){
  if(!isFullscreenMode) return;
  isFullscreenMode = false;
  
  const col1 = document.querySelectorAll('.col-lg-2')[0];
  const col2 = document.querySelector('.col-12');
  const col3 = document.querySelectorAll('.col-lg-2')[1];
  
  if(col1) col1.style.display = '';
  if(col3) col3.style.display = '';
  if(col2){
    col2.classList.remove('col-12');
    col2.classList.add('col-lg-8', 'col-md-6');
    const card = col2.querySelector('.card');
    if(card) card.style.height = '';
  }
  
  fetchDashboardData();
}

// Track activity
document.addEventListener('mousemove', recordActivity, {passive: true});
document.addEventListener('click', recordActivity, {passive: true});
document.addEventListener('keydown', recordActivity, {passive: true});
document.addEventListener('scroll', recordActivity, {passive: true});
document.addEventListener('touchstart', recordActivity, {passive: true});
resetIdleTimer();

// ---------------- QR Keyboard Scanner on Dashboard ----------------
// Goal: When a student QR is scanned on the main dashboard, automatically
// start a session, or if already active, check the student out.
// We listen for fast keystrokes from the hardware scanner and finalize
// the payload after a brief idle timeout.

(function(){
  let scanBuffer = '';
  let finalizeTimer = null;
  let forceFinalizeTimer = null;
  let lastKeyTs = 0;
  const IDLE_MS = 180; // idle gap that indicates scan end
  const FORCE_MS = 1000; // max wait before forcing finalize
  const KEEP_FOCUS_MS = 2000; // refocus interval to keep page ready
  let focusTimer = null;
  let listenersAttached = false;

  // Debug panel to collect logs visible on the page
  function ensureDebugPanel(){
    if(document.getElementById('dashDebugPanel')) return;
    const wrap = document.createElement('div');
    wrap.id = 'dashDebugPanel';
    wrap.style.position='fixed';
    wrap.style.bottom='12px';
    wrap.style.right='12px';
    wrap.style.width='320px';
    wrap.style.maxHeight='240px';
    wrap.style.zIndex='2100';
    wrap.style.background='#fff';
    wrap.style.border='1px solid #ced4da';
    wrap.style.boxShadow='0 4px 12px rgba(0,0,0,0.15)';
    wrap.style.borderRadius='6px';
    wrap.innerHTML = `
      <div style="display:flex; align-items:center; justify-content:space-between; padding:6px 8px; background:#0d6efd; color:#fff; border-radius:6px 6px 0 0;">
        <strong style="font-size:0.95em;">Scanner Debug Log</strong>
        <div>
          <button id="dashDebugCopy" class="btn btn-sm btn-light py-0 px-1">Copy</button>
          <button id="dashDebugClear" class="btn btn-sm btn-outline-light py-0 px-1">Clear</button>
        </div>
      </div>
      <textarea id="dashDebugArea" readonly tabindex="-1" style="width:100%; height:180px; font-size:12px; font-family:monospace; border:0; padding:6px; resize:none; outline:none; user-select:text;"></textarea>
    `;
    document.body.appendChild(wrap);
    document.getElementById('dashDebugCopy').onclick = () => {
      const ta = document.getElementById('dashDebugArea');
      ta.select();
      document.execCommand('copy');
    };
    document.getElementById('dashDebugClear').onclick = () => {
      const ta = document.getElementById('dashDebugArea');
      ta.value='';
    };
  }

  function logDebug(msg){
    ensureDebugPanel();
    const ta = document.getElementById('dashDebugArea');
    const ts = new Date().toLocaleTimeString();
    ta.value += `[${ts}] ${msg}\n`;
    ta.scrollTop = ta.scrollHeight;
    console.debug('[dashboard][scan]', msg);
  }

  function isTypingInField(){
    const ae = document.activeElement;
    if(!ae) return false;
    const tag = ae.tagName?.toLowerCase();
    const isEditable = ae.isContentEditable;
    // Allow scanning even if search field is focused, but don't intercept
    // normal typing (scanner sends rapid keystrokes, we collect globally)
    return (tag === 'textarea') || (tag === 'input' && ae.type !== 'button' && ae.type !== 'checkbox' && ae.type !== 'radio') || isEditable;
  }

  function deduplicateCharacters(str){
    // Scanner sends each character 4x for error correction: IIIIDDDD -> ID
    if(!str || str.length < 2) return str;
    
    // Try different repeat factors (4x, 3x, 2x)
    for(let n of [4, 3, 2]){
      if(str.length % n !== 0) continue;
      let candidate = '';
      let matches = true;
      for(let i=0; i<str.length; i+=n){
        const chunk = str.substring(i, i+n);
        const firstChar = chunk[0];
        if(chunk.split('').every(c => c === firstChar)){
          candidate += firstChar;
        } else {
          matches = false;
          break;
        }
      }
      if(matches && candidate.length > 0){
        logDebug(`CHAR DEDUP: ${n}x repetition detected`);
        return candidate;
      }
    }
    return str;
  }

  function normalizePayload(str){
    return String(str||'')
      .replace(/\r\n/g, "\n")
      .replace(/\r/g, "\n")
      .replace(/[\u202F\u2009\u00A0]/g, ' ')
      .trim();
  }

  function deduplicateRepeatingDigits(numStr){
    if(!numStr || numStr.length < 2) return numStr;
    const uniqCount = new Set(numStr.split('')).size;

    // Case A: all digits identical
    if(uniqCount === 1){
      // If length <= 2, keep as-is (e.g., 44 is valid ID 44)
      if(numStr.length <= 2) return numStr;
      // If length > 2, keep first two digits (e.g., 333333 -> 33)
      return numStr.slice(0, 2);
    }

    // Case B: digit-repeat-based (e.g., 5577 -> 57, each digit repeats n times)
    if(numStr.length % 2 === 0){
      for(let n=2; n<=numStr.length/2; n++){
        if(numStr.length % n === 0){
          let result = '';
          for(let i=0;i<numStr.length;i+=n) result += numStr[i];
          let reconstructed = '';
          for(const d of result){ for(let j=0;j<n;j++) reconstructed += d; }
          if(reconstructed === numStr) return result;
        }
      }
    }

    // Case C: pattern-based, but avoid collapsing to single digit
    for(let patternLen=2; patternLen<=Math.floor(numStr.length/2); patternLen++){
      const pattern = numStr.substring(0, patternLen);
      let repeated = '';
      for(let i=0;i<Math.ceil(numStr.length/patternLen);i++) repeated += pattern;
      if(repeated.substring(0, numStr.length) === numStr) return pattern;
    }

    return numStr;
  }

  async function finalizeScan(){
    let raw = scanBuffer;
    scanBuffer = '';
    if(finalizeTimer){ clearTimeout(finalizeTimer); finalizeTimer = null; }
    if(forceFinalizeTimer){ clearTimeout(forceFinalizeTimer); forceFinalizeTimer = null; }

    // Deduplicate character-level repetition first (scanner sends 4x chars)
    raw = deduplicateCharacters(raw);
    const data = normalizePayload(raw);
    if(!data) return;
    logDebug(`RAW=${JSON.stringify(raw)}`);

    // Try to extract student ID from a variety of formats produced by scanners
    let sid = null;

    // Tier 1: direct clean pattern, e.g., "ID:57"
    let m = data.match(/^(ID|ASST|ASSISTANT)\s*[:;=]?\s*(\d+)$/i);
    if(m){
      let idStr = m[2];
      sid = parseInt(deduplicateRepeatingDigits(idStr),10);
      logDebug(`DIRECT match -> ${sid}`);
    }

    // Tier 2: flexible pattern with noise, e.g., "IID0:+5577" (grab digits after token)
    if(sid == null){
      m = data.match(/(ID|ASST|ASSISTANT)[^\d]*[:+;=]*([0-9]+)/i);
      if(m){
        let idStr = m[2];
        if(idStr.length < 2){
          const later = data.match(/(\d{2,6})(?!.*\d)/);
          if(later) idStr = later[1];
        }
        sid = parseInt(deduplicateRepeatingDigits(idStr),10);
        logDebug(`FLEX match -> ${sid} from ${idStr}`);
      }
    }

    // Tier 3: search anywhere for the last digits block, e.g., trailing "77jj" -> 77
    if(sid == null){
      m = data.match(/(\d{2,6})(?!.*\d)/);
      if(m){
        sid = parseInt(deduplicateRepeatingDigits(m[1]),10);
        logDebug(`LAST-DIGITS match -> ${sid}`);
      }
    }

    // Tier 4: all digits only
    if(sid == null){
      const onlyDigits = data.match(/^(\d{1,6})$/);
      if(onlyDigits){ sid = parseInt(deduplicateRepeatingDigits(onlyDigits[1]),10); logDebug(`ONLY-DIGITS -> ${sid}`); }
    }

    if(!Number.isFinite(sid)) return;

    // Toggle the session and refresh the dashboard
    try{
      const res = await fetch('/api/sessions/toggle',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ student_id: sid })
      });
      const j = await res.json().catch(()=>({}));
      // Show a quick toast-like feedback
      if(!res.ok){
        console.warn('[dashboard][scan] toggle failed', j);
        showQuickToast(`ID ${sid}: ${j.error || 'Toggle failed'}`, true);
        logDebug(`TOGGLE FAIL id=${sid} status=${res.status} body=${JSON.stringify(j)}`);
      } else {
        const action = (j && j.action) ? (j.action==='started'?'Started':'Checked Out') : 'Updated';
        showQuickToast(`${j.name||('Student '+sid)} — ${action}`);
        logDebug(`TOGGLE OK id=${sid} action=${action}`);
      }
      // refresh dashboard columns
      fetchDashboardData();
    }catch(err){
      console.error('[dashboard] toggle error', err);
      showQuickToast('Error toggling session for ID '+sid, true);
      logDebug(`ERROR id=${sid} msg=${err.message}`);
    }

    // ensure buffers are clear and ready for next scan immediately
    scanBuffer = '';
    lastKeyTs = 0;
  }

  function scheduleFinalize(){
    if (!isActiveClassWindow || !pageIsReadyForScan()) return;
    if(finalizeTimer) clearTimeout(finalizeTimer);
    finalizeTimer = setTimeout(finalizeScan, IDLE_MS);
    if(forceFinalizeTimer) clearTimeout(forceFinalizeTimer);
    forceFinalizeTimer = setTimeout(finalizeScan, FORCE_MS);
  }

  function onKeyDown(e){
    if (!isActiveClassWindow || !pageIsReadyForScan()) return;
    // Block disruptive browser shortcuts (downloads/print/save/open/close)
    if (e.ctrlKey) {
      const kk = (e.key || '').toLowerCase();
      if (["j","p","o","s","w"].includes(kk)) {
        e.preventDefault();
        e.stopPropagation();
        logDebug(`BLOCKED Ctrl+${kk.toUpperCase()}`);
        return;
      }
      // Ignore other Ctrl combos
      return;
    }
    // Ignore Alt/Meta
    if(e.altKey || e.metaKey) return;
    const k = e.key;
    if(k === 'Enter'){ e.preventDefault(); finalizeScan(); return; }
    if(k.length === 1){
      const now = Date.now();
      logDebug(`KEY '${k}' buffer_before='${scanBuffer}' dt=${now-lastKeyTs}ms`);
      lastKeyTs = now;
      // If the user is typing in the search field, allow typing but still build the scan buffer
      // Scanner sends fast sequences; human typing won't trigger finalize due to larger gaps
      scanBuffer += k;
      scheduleFinalize();
    }
  }

  // Keep focus on body to avoid losing key events after first scan
  function keepFocus(){
    if(focusTimer) clearTimeout(focusTimer);
    if(document.activeElement && document.activeElement.id === 'dashDebugArea'){
      // don't steal focus if user is copying logs
    } else {
      // attempt to focus body without moving cursor
      if(document.body) document.body.focus({preventScroll:true});
    }
    focusTimer = setTimeout(keepFocus, KEEP_FOCUS_MS);
  }

  function attachListeners(){
    if(listenersAttached) return;
    document.addEventListener('keydown', onKeyDown, {capture:true});
    window.addEventListener('keydown', onKeyDown, {capture:true});
    document.addEventListener('keypress', onKeyDown, {capture:true});
    window.addEventListener('keypress', onKeyDown, {capture:true});
    listenersAttached = true;
    logDebug('Listeners attached (document/window, keydown/keypress, capture=true)');
  }

  function showQuickToast(msg, isError){
    let el = document.getElementById('dashQuickToast');
    if(!el){
      el = document.createElement('div');
      el.id = 'dashQuickToast';
      el.style.position='fixed'; el.style.top='12px'; el.style.right='12px';
      el.style.zIndex='2000'; el.style.minWidth='220px';
      document.body.appendChild(el);
    }
    el.innerHTML = `<div class="alert ${isError?'alert-danger':'alert-success'} shadow-sm py-2 px-3 mb-0">${msg}</div>`;
    setTimeout(()=>{ if(el) el.innerHTML=''; }, 2500);
  }

  // Attach global keydown listener on dashboard
  ensureDebugPanel();
  keepFocus();
  attachListeners();
})();
</script>
