{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<div class="container-fluid mt-3" style="max-width:900px; padding:0 10px;">
  <h4 class="mb-3">{{ action }} Student</h4>
  <form method="post" enctype="multipart/form-data">
    <!-- Basic Info Row -->
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="row g-2">
      <div class="col-md-12">
        <label class="form-label small">Name</label>
        <input name="name" class="form-control form-control-sm" value="{{ student[1] if student else '' }}" required>
      </div>
    </div>

    <!-- Contact Info Row -->
    <div class="row g-2 mt-1">
      <div class="col-md-6">
        <label class="form-label small">Email</label>
        <input name="email" type="email" class="form-control form-control-sm" value="{{ student[3] if student else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label small">Phone</label>
        <input name="phone" class="form-control form-control-sm" value="{{ student[4] if student else '' }}">
      </div>
    </div>

    <!-- All Checkboxes Grouped Together -->
    <div class="row g-2 mt-2">
      <div class="col-md-2">
        <div class="form-check">
          <input name="s1" type="checkbox" class="form-check-input subject-checkbox" id="s1Check" {{ 'checked' if (student and student[2] == 'S1') else '' }} onchange="handleSubjectChange('s1')">
          <label class="form-check-label small" for="s1Check">S1 (One Subject)</label>
        </div>
      </div>
      <div class="col-md-2">
        <div class="form-check">
          <input name="s2" type="checkbox" class="form-check-input subject-checkbox" id="s2Check" {{ 'checked' if (student and student[2] == 'S2') else '' }} onchange="handleSubjectChange('s2')">
          <label class="form-check-label small" for="s2Check">S2 (Two Subjects)</label>
        </div>
      </div>
      <div class="col-md-2">
        <div class="form-check">
          <input name="book_loaned" type="checkbox" class="form-check-input" id="bookLoanedCheck" {{ 'checked' if (student and student[7]) else '' }}>
          <label class="form-check-label small" for="bookLoanedCheck">Book Loaned</label>
        </div>
      </div>
      <div class="col-md-1">
        <div class="form-check">
          <input name="paper_ws" type="checkbox" class="form-check-input" id="paperWSCheck" {{ 'checked' if (student and student[8]) else '' }}>
          <label class="form-check-label small" for="paperWSCheck">Paper WS</label>
        </div>
      </div>
      <div class="col-md-2">
        <div class="form-check">
          <input name="el" type="checkbox" class="form-check-input el-pi-check" id="elCheck" {{ 'checked' if (student and student[13]) else '' }} onchange="handleELPIChange('el')">
          <label class="form-check-label small" for="elCheck">Early Learner</label>
        </div>
      </div>
      <div class="col-md-2">
        <div class="form-check">
          <input name="pi" type="checkbox" class="form-check-input el-pi-check" id="piCheck" {{ 'checked' if (student and student[14]) else '' }} onchange="handleELPIChange('pi')">
          <label class="form-check-label small" for="piCheck">Primary Instruction</label>
        </div>
      </div>
      <div class="col-md-1">
        <div class="form-check">
          <input name="v" type="checkbox" class="form-check-input" id="vCheck" {{ 'checked' if (student and student[15]) else '' }}>
          <label class="form-check-label small" for="vCheck">Virtual</label>
        </div>
      </div>
    </div>
    <input type="hidden" name="subject" id="subjectValue" value="{{ student[2] if student else '' }}">

    <!-- Math Goals Row -->
    <div class="row g-2 mt-1">
      <div class="col-md-6">
        <label class="form-label small">Math Goal</label>
        <input name="math_goal" class="form-control form-control-sm" value="{{ student[9] if student else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label small">Math WS/Week</label>
        <input name="math_worksheets_per_week" type="number" class="form-control form-control-sm" min="0" value="{{ student[10] if student else 0 }}">
      </div>
    </div>

    <!-- Reading Goals Row -->
    <div class="row g-2 mt-1">
      <div class="col-md-6">
        <label class="form-label small">Reading Goal</label>
        <input name="reading_goal" class="form-control form-control-sm" value="{{ student[11] if student else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label small">Reading WS/Week</label>
        <input name="reading_worksheets_per_week" type="number" class="form-control form-control-sm" min="0" value="{{ student[12] if student else 0 }}">
      </div>
    </div>

    <!-- Day 1 Schedule Row -->
    <div class="row g-2 mt-1">
      <div class="col-md-6">
        <label class="form-label small">Day 1</label>
        <select name="day1" id="day1Select" class="form-control form-control-sm" onchange="updateDay1Times()">
          <option value="">-- Select Day --</option>
          {% if profile %}
            {% set days = [('Monday', 'monday'), ('Tuesday', 'tuesday'), ('Wednesday', 'wednesday'), ('Thursday', 'thursday'), ('Friday', 'friday'), ('Saturday', 'saturday'), ('Sunday', 'sunday')] %}
            {% for day_name, day_key in days %}
              {% if profile[day_key + '_start'] and profile[day_key + '_end'] %}
                <option value="{{ day_name }}" {% if student and student[16] == day_name %}selected{% endif %}>{{ day_name }}</option>
              {% endif %}
            {% endfor %}
          {% endif %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label small">Day 1 Time</label>
        <select name="day1_time" id="day1TimeSelect" class="form-control form-control-sm">
          <option value="">-- Select Time --</option>
        </select>
      </div>
    </div>

    <!-- Day 2 Schedule Row -->
    <div class="row g-2 mt-1">
      <div class="col-md-6">
        <label class="form-label small">Day 2</label>
        <select name="day2" id="day2Select" class="form-control form-control-sm" onchange="updateDay2Times()">
          <option value="">-- Select Day --</option>
          {% if profile %}
            {% set days = [('Monday', 'monday'), ('Tuesday', 'tuesday'), ('Wednesday', 'wednesday'), ('Thursday', 'thursday'), ('Friday', 'friday'), ('Saturday', 'saturday'), ('Sunday', 'sunday')] %}
            {% for day_name, day_key in days %}
              {% if profile[day_key + '_start'] and profile[day_key + '_end'] %}
                <option value="{{ day_name }}" {% if student and student[17] == day_name %}selected{% endif %}>{{ day_name }}</option>
              {% endif %}
            {% endfor %}
          {% endif %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label small">Day 2 Time</label>
        <select name="day2_time" id="day2TimeSelect" class="form-control form-control-sm">
          <option value="">-- Select Time --</option>
        </select>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="mt-3">
      <button type="submit" class="btn btn-primary btn-sm">{{ action }}</button>
      <a href="{{ url_for('students_list') }}" class="btn btn-secondary btn-sm">Cancel</a>
      {% if from_calendar %}
        <a href="{{ url_for('center_calendar') }}" class="btn btn-info btn-sm">Calendar</a>
      {% endif %}
    </div>
  </form>
</div>

<script>
// Class hours data from instructor profile
const classHours = {
  {% if profile %}
    {% set days = [('Monday', 'monday'), ('Tuesday', 'tuesday'), ('Wednesday', 'wednesday'), ('Thursday', 'thursday'), ('Friday', 'friday'), ('Saturday', 'saturday'), ('Sunday', 'sunday')] %}
    {% for day_name, day_key in days %}
      {% if profile[day_key + '_start'] and profile[day_key + '_end'] %}
        '{{ day_name }}': { start: '{{ profile[day_key + '_start'] }}', end: '{{ profile[day_key + '_end'] }}' },
      {% endif %}
    {% endfor %}
  {% endif %}
};

// Generate time slots in 30-minute increments
function generateTimeSlots(startTime, endTime, offsetMinutes) {
  const slots = [];
  const [startHour, startMin] = startTime.split(':').map(Number);
  const [endHour, endMin] = endTime.split(':').map(Number);
  
  let currentMinutes = startHour * 60 + startMin;
  const endMinutes = endHour * 60 + endMin - offsetMinutes;
  
  while (currentMinutes <= endMinutes) {
    const hour = Math.floor(currentMinutes / 60);
    const min = currentMinutes % 60;
    const timeStr = `${String(hour).padStart(2, '0')}:${String(min).padStart(2, '0')}`;
    
    // Convert to 12-hour format for display
    const displayHour = hour > 12 ? hour - 12 : (hour === 0 ? 12 : hour);
    const displayStr = `${displayHour}:${String(min).padStart(2, '0')} PM`;
    
    slots.push({ value: timeStr, display: displayStr });
    currentMinutes += 30;
  }
  
  return slots;
}

// Handle Early Learner and Primary Instruction mutual exclusion
function handleELPIChange(checkbox) {
  const elCheck = document.getElementById('elCheck');
  const piCheck = document.getElementById('piCheck');
  
  if (checkbox === 'el' && elCheck.checked) {
    piCheck.checked = false;
  } else if (checkbox === 'pi' && piCheck.checked) {
    elCheck.checked = false;
  }
}

// Update Day 1 time slots
function updateDay1Times() {
  const day1Select = document.getElementById('day1Select');
  const day1TimeSelect = document.getElementById('day1TimeSelect');
  const selectedDay = day1Select.value;
  const savedTime = '{{ student[18] if student else "" }}';
  
  // Clear existing options
  day1TimeSelect.innerHTML = '<option value="">-- Select Time --</option>';
  
  if (selectedDay && classHours[selectedDay]) {
    // Get subject to determine offset
    const s1 = document.getElementById('s1Check');
    const s2 = document.getElementById('s2Check');
    const offset = s1.checked ? 30 : (s2.checked ? 60 : 30);
    
    const hours = classHours[selectedDay];
    const slots = generateTimeSlots(hours.start, hours.end, offset);
    
    slots.forEach(slot => {
      const option = document.createElement('option');
      option.value = slot.value;
      option.textContent = slot.display;
      if (savedTime && slot.value === savedTime) {
        option.selected = true;
      }
      day1TimeSelect.appendChild(option);
    });
  }
}

// Update Day 2 time slots
function updateDay2Times() {
  const day2Select = document.getElementById('day2Select');
  const day2TimeSelect = document.getElementById('day2TimeSelect');
  const selectedDay = day2Select.value;
  const savedTime = '{{ student[19] if student else "" }}';
  
  // Clear existing options
  day2TimeSelect.innerHTML = '<option value="">-- Select Time --</option>';
  
  if (selectedDay && classHours[selectedDay]) {
    // Get subject to determine offset
    const s1 = document.getElementById('s1Check');
    const s2 = document.getElementById('s2Check');
    const offset = s1.checked ? 30 : (s2.checked ? 60 : 30);
    
    const hours = classHours[selectedDay];
    const slots = generateTimeSlots(hours.start, hours.end, offset);
    
    slots.forEach(slot => {
      const option = document.createElement('option');
      option.value = slot.value;
      option.textContent = slot.display;
      if (savedTime && slot.value === savedTime) {
        option.selected = true;
      }
      day2TimeSelect.appendChild(option);
    });
  }
}

// Initialize time slots on page load
document.addEventListener('DOMContentLoaded', function() {
  updateDay1Times();
  updateDay2Times();
});

// Subject checkbox mutual exclusion logic
function handleSubjectChange(checked) {
  const s1 = document.getElementById('s1Check');
  const s2 = document.getElementById('s2Check');
  const subjectValue = document.getElementById('subjectValue');
  
  if (checked === 's1') {
    if (s1.checked) {
      s2.checked = false;
      subjectValue.value = 'S1';
    } else {
      subjectValue.value = '';
    }
  } else if (checked === 's2') {
    if (s2.checked) {
      s1.checked = false;
      subjectValue.value = 'S2';
    } else {
      subjectValue.value = '';
    }
  }
  
  // Regenerate time slots when subject changes
  updateDay1Times();
  updateDay2Times();
}

// Validate subject selection on form submission
document.querySelector('form').addEventListener('submit', function(e) {
  const s1 = document.getElementById('s1Check');
  const s2 = document.getElementById('s2Check');
  
  if (!s1.checked && !s2.checked) {
    e.preventDefault();
    alert('Please select at least one subject type (S1 or S2)');
    return false;
  }
});
</script>
{% endblock %}
