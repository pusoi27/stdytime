{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h4>Assistant Hours Summary (last {{ days }} days)</h4>
  <div class="mb-2">
    <a href="{{ url_for('reports_assistants_pdf', days=days) }}" class="btn btn-primary btn-sm">Download PDF</a>
    <a href="{{ url_for('reports_assistants') }}" class="btn btn-outline-secondary btn-sm">Refresh</a>
  </div>
  <table class="table table-sm table-striped">
    <thead class="table-primary"><tr><th>Name</th><th>Sessions</th><th>Total Time</th></tr></thead>
    <tbody>
      {% for name, sessions, total in data %}
      <tr>
        <td>{{ name }}</td>
        <td>{{ sessions }}</td>
        <td>{{ total }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
