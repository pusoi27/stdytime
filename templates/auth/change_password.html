<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stdytime - Set New Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        body {
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 55%, #7cb342 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }
        .card-header-custom {
            text-align: center;
            margin-bottom: 30px;
        }
        .card-header-custom h1 {
            color: var(--brand-primary);
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .card-header-custom p {
            color: #666;
            font-size: 0.95rem;
        }
        .form-label {
            font-weight: 600;
            color: #333;
        }
        .form-control {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 0.2rem rgba(46, 125, 50, 0.2);
        }
        .btn-save {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 65%, #4caf50 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(46, 125, 50, 0.35);
            color: white;
        }
        .requirement-list {
            font-size: 0.85rem;
            color: #888;
            margin-top: 6px;
            padding-left: 1rem;
        }
    </style>
</head>
<body class="auth-themed">
    <div class="card-container">
        <div class="card-header-custom">
            <h1>Stdytime</h1>
            <p>Set a new password to continue</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.change_password') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label for="new_password" class="form-label">New Password</label>
                <input type="password" class="form-control" id="new_password" name="new_password"
                       placeholder="Enter new password" required autofocus>
                <ul class="requirement-list">
                    <li>At least 8 characters</li>
                </ul>
            </div>
            <div class="mb-4">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                       placeholder="Repeat new password" required>
            </div>
            <button type="submit" class="btn-save">Save New Password</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
